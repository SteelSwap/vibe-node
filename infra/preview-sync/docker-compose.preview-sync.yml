# vibe-node preview testnet sync benchmark
#
# Runs vibe-node against the public preview testnet to measure sync performance.
# A metrics sidecar captures RSS, block height, and timing data periodically.
#
# Usage:
#   docker compose -f docker-compose.preview-sync.yml build
#   docker compose -f docker-compose.preview-sync.yml up -d
#   docker compose -f docker-compose.preview-sync.yml logs -f vibe-node
#
# Results and error logs are written to the ./results/ bind mount.

services:
  # ─── Genesis Config Fetch ───────────────────────────────────────
  # Downloads Preview genesis files from IOG's config server.
  genesis-init:
    image: alpine:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -f /genesis/shelley-genesis.json ]; then
          echo "=== Genesis config already present ==="
          exit 0
        fi
        apk add --no-cache wget
        BASE_URL="https://book.play.dev.cardano.org/environments/preview"
        for FILE in config.json byron-genesis.json shelley-genesis.json alonzo-genesis.json conway-genesis.json; do
          echo "Downloading $$FILE..."
          wget -q -O "/genesis/$$FILE" "$$BASE_URL/$$FILE"
        done
        echo "=== Preview genesis config ready ==="
        ls -la /genesis/
    volumes:
      - preview-genesis:/genesis

  # ─── Vibe Node (Preview Sync) ─────────────────────────────────────
  vibe-node:
    build:
      context: ../..
      dockerfile: infra/preview-sync/Dockerfile.preview-sync
    environment:
      VIBE_NETWORK_MAGIC: "2"
      VIBE_PEERS: "preview-node.play.dev.cardano.org:3001,52.215.17.31:3001,18.117.34.199:3001,52.211.202.88:3001,99.80.240.19:3001,3.134.226.73:3001,18.185.163.167:3001,13.58.19.0:3001,3.74.40.92:3001"
      VIBE_DATA_DIR: "/data"
      VIBE_GENESIS_DIR: "/genesis"
      VIBE_ERROR_LOG: "/results/errors.log"
      VIBE_PERMISSIVE_VALIDATION: "true"
      VIBE_STRICT_SYNC: "true"
    volumes:
      - vibe-preview-data:/data
      - preview-genesis:/genesis:ro
      - ./results:/results
    ports:
      - "${VIBE_NODE_PORT:-30010}:3001"
    depends_on:
      genesis-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c 'print(\"ok\")'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  # ─── Metrics Capture Sidecar ──────────────────────────────────────
  # Monitors vibe-node via /proc and writes periodic snapshots to JSON.
  metrics-capture:
    build:
      context: ../..
      dockerfile: infra/preview-sync/Dockerfile.preview-sync
    entrypoint: ["uv", "run", "python", "/app/scripts/capture-metrics.py"]
    environment:
      METRICS_TARGET: "vibe.cardano.node"
      METRICS_INTERVAL: "${METRICS_INTERVAL:-30}"
      METRICS_OUTPUT: "/results/vibe-node-metrics.json"
      METRICS_NODE_TYPE: "vibe-node"
      METRICS_NODE_HOST: "vibe-node"
      METRICS_NODE_PORT: "3001"
      METRICS_NETWORK_MAGIC: "2"
    volumes:
      - ./results:/results
    pid: "service:vibe-node"
    depends_on:
      vibe-node:
        condition: service_started
    restart: unless-stopped

volumes:
  vibe-preview-data:
  preview-genesis:
