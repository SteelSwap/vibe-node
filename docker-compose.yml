# vibe-node development infrastructure
# Usage: docker compose up -d
# Full stack: ParadeDB, Ollama, Mithril → cardano-node → Ogmios

services:
  # ─── Knowledge Base Infrastructure ────────────────────────────────

  paradedb:
    image: paradedb/paradedb:latest-pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vibenode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibenode}
      POSTGRES_DB: ${POSTGRES_DB:-vibenode}
    volumes:
      - paradedb-data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${PARADEDB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibenode}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vibe-node
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - vibe-node
    restart: unless-stopped

  # Pull and verify the embedding model on first startup
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init.sh"]
    environment:
      OLLAMA_HOST: http://ollama:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-hf.co/jinaai/jina-code-embeddings-1.5b-GGUF:Q8_0}
    volumes:
      - ./infra/ollama/init.sh:/init.sh:ro
    networks:
      - vibe-node
    restart: "no"

  # ─── Cardano Infrastructure ───────────────────────────────────────

  mithril:
    image: ghcr.io/input-output-hk/mithril-client:latest
    user: root
    command:
      - cardano-db
      - download
      - --download-dir
      - /data/db
      - --include-ancillary
      - ${SNAPSHOT_DIGEST:-latest}
    environment:
      AGGREGATOR_ENDPOINT: ${AGGREGATOR_ENDPOINT:-https://aggregator.release-preprod.api.mithril.network/aggregator}
      GENESIS_VERIFICATION_KEY: ${GENESIS_VERIFICATION_KEY:-5b3132372c37332c3132342c3136312c362c3133372c3133312c3231332c3230372c3131372c3139382c38352c3137362c3139392c3136322c3234312c36382c3132332c3131392c3134352c31332c3233322c3234332c34392c3232392c322c3234392c3230352c3230352c33392c3233352c34345d}
      ANCILLARY_VERIFICATION_KEY: ${ANCILLARY_VERIFICATION_KEY:-5b3138392c3139322c3231362c3135302c3131342c3231362c3233372c3231302c34352c31382c32312c3139362c3230382c3234362c3134362c322c3235322c3234332c3235312c3139372c32382c3135372c3230342c3134352c33302c31342c3232382c3136382c3132392c38332c3133362c33365d}
    volumes:
      - cardano-node-data:/data
    networks:
      - vibe-node
    restart: "no"

  cardano-node:
    image: ghcr.io/intersectmbo/cardano-node:latest
    depends_on:
      mithril:
        condition: service_completed_successfully
    environment:
      CARDANO_NODE_SOCKET_PATH: /data/node.socket
      NETWORK: ${CARDANO_NETWORK:-preprod}
    volumes:
      - cardano-node-data:/data
    ports:
      - "${CARDANO_NODE_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "test -S /data/node.socket"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - vibe-node
    restart: unless-stopped

  ogmios:
    image: cardanosolutions/ogmios:latest
    depends_on:
      cardano-node:
        condition: service_healthy
    command:
      - --host
      - "0.0.0.0"
      - --node-socket
      - /data/node.socket
      - --node-config
      - /data/config.json
    volumes:
      - cardano-node-data:/data:ro
    ports:
      - "${OGMIOS_PORT:-1337}:1337"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1337/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - vibe-node
    restart: unless-stopped

# ─── Networks ─────────────────────────────────────────────────────

networks:
  vibe-node:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────

volumes:
  paradedb-data:
  cardano-node-data:
  ollama-data:
