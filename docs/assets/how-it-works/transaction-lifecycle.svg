<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="tlGrad" gradientTransform="rotate(110)">
      <stop offset="0%" style="stop-color:#ED458E"/>
      <stop offset="100%" style="stop-color:#F48020"/>
    </linearGradient>
    <linearGradient id="tlStep">
      <stop offset="0%" style="stop-color:#d94080"/>
      <stop offset="100%" style="stop-color:#E86040"/>
    </linearGradient>
    <filter id="tlShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="500" rx="16" fill="#1a1b1e"/>
  <rect width="800" height="4" fill="url(#tlGrad)"/>

  <text x="400" y="38" text-anchor="middle" fill="url(#tlGrad)" font-size="18" font-weight="800">Journey of a Transaction</text>
  <text x="400" y="56" text-anchor="middle" fill="#909296" font-size="10">From your wallet to the blockchain, step by step</text>

  <!-- Step 1: Wallet -->
  <rect x="40" y="80" width="150" height="80" rx="10" fill="#25262b" stroke="#ED458E" stroke-width="2" filter="url(#tlShadow)"/>
  <text x="115" y="106" text-anchor="middle" fill="#ED458E" font-size="13" font-weight="700">1. Build &amp; Sign</text>
  <text x="115" y="126" text-anchor="middle" fill="#909296" font-size="10">Your wallet creates</text>
  <text x="115" y="142" text-anchor="middle" fill="#909296" font-size="10">the transaction and</text>
  <text x="115" y="155" text-anchor="middle" fill="#909296" font-size="9">signs it with your key</text>

  <!-- Step 2: Submit -->
  <rect x="230" y="80" width="150" height="80" rx="10" fill="#25262b" stroke="#d94080" stroke-width="2" filter="url(#tlShadow)"/>
  <text x="305" y="106" text-anchor="middle" fill="#d94080" font-size="13" font-weight="700">2. Submit</text>
  <text x="305" y="126" text-anchor="middle" fill="#909296" font-size="10">Sent to your local</text>
  <text x="305" y="142" text-anchor="middle" fill="#909296" font-size="10">node via the local</text>
  <text x="305" y="155" text-anchor="middle" fill="#909296" font-size="9">tx-submission protocol</text>

  <!-- Step 3: Validate -->
  <rect x="420" y="80" width="150" height="80" rx="10" fill="#25262b" stroke="#E86040" stroke-width="2" filter="url(#tlShadow)"/>
  <text x="495" y="106" text-anchor="middle" fill="#E86040" font-size="13" font-weight="700">3. Validate</text>
  <text x="495" y="126" text-anchor="middle" fill="#909296" font-size="10">Ledger rules check</text>
  <text x="495" y="142" text-anchor="middle" fill="#909296" font-size="10">inputs, balance, fees,</text>
  <text x="495" y="155" text-anchor="middle" fill="#909296" font-size="9">scripts, signatures</text>

  <!-- Step 4: Mempool -->
  <rect x="610" y="80" width="150" height="80" rx="10" fill="url(#tlStep)" filter="url(#tlShadow)"/>
  <text x="685" y="106" text-anchor="middle" fill="white" font-size="13" font-weight="700">4. Mempool</text>
  <text x="685" y="126" text-anchor="middle" fill="#ffd0b0" font-size="10">Tx waits here until</text>
  <text x="685" y="142" text-anchor="middle" fill="#ffd0b0" font-size="10">a block producer</text>
  <text x="685" y="155" text-anchor="middle" fill="#ffd0b0" font-size="9">picks it up</text>

  <!-- Arrows row 1 -->
  <line x1="190" y1="120" x2="228" y2="120" stroke="#d94080" stroke-width="2"/>
  <polygon points="226,116 234,120 226,124" fill="#d94080"/>
  <line x1="380" y1="120" x2="418" y2="120" stroke="#E86040" stroke-width="2"/>
  <polygon points="416,116 424,120 416,124" fill="#E86040"/>
  <line x1="570" y1="120" x2="608" y2="120" stroke="#F48020" stroke-width="2"/>
  <polygon points="606,116 614,120 606,124" fill="#F48020"/>

  <!-- Down arrow -->
  <line x1="685" y1="162" x2="685" y2="200" stroke="#F48020" stroke-width="2"/>
  <polygon points="681,198 689,198 685,206" fill="#F48020"/>

  <!-- Step 5: Propagate -->
  <rect x="610" y="210" width="150" height="80" rx="10" fill="#25262b" stroke="#F48020" stroke-width="2" filter="url(#tlShadow)"/>
  <text x="685" y="236" text-anchor="middle" fill="#F48020" font-size="13" font-weight="700">5. Propagate</text>
  <text x="685" y="256" text-anchor="middle" fill="#909296" font-size="10">Shared with peers</text>
  <text x="685" y="272" text-anchor="middle" fill="#909296" font-size="10">via tx-submission</text>
  <text x="685" y="285" text-anchor="middle" fill="#909296" font-size="9">protocol (N2N)</text>

  <!-- Step 6: Forge -->
  <rect x="420" y="210" width="150" height="80" rx="10" fill="#25262b" stroke="#E86040" stroke-width="2" filter="url(#tlShadow)"/>
  <text x="495" y="236" text-anchor="middle" fill="#E86040" font-size="13" font-weight="700">6. Forge Block</text>
  <text x="495" y="256" text-anchor="middle" fill="#909296" font-size="10">A stake pool wins</text>
  <text x="495" y="272" text-anchor="middle" fill="#909296" font-size="10">the slot and includes</text>
  <text x="495" y="285" text-anchor="middle" fill="#909296" font-size="9">your tx in the block</text>

  <!-- Step 7: Broadcast -->
  <rect x="230" y="210" width="150" height="80" rx="10" fill="#25262b" stroke="#d94080" stroke-width="2" filter="url(#tlShadow)"/>
  <text x="305" y="236" text-anchor="middle" fill="#d94080" font-size="13" font-weight="700">7. Broadcast</text>
  <text x="305" y="256" text-anchor="middle" fill="#909296" font-size="10">Block sent to all</text>
  <text x="305" y="272" text-anchor="middle" fill="#909296" font-size="10">peers via chain-sync</text>
  <text x="305" y="285" text-anchor="middle" fill="#909296" font-size="9">&amp; block-fetch</text>

  <!-- Step 8: Confirmed -->
  <rect x="40" y="210" width="150" height="80" rx="10" fill="#25262b" stroke="#ED458E" stroke-width="2" filter="url(#tlShadow)"/>
  <text x="115" y="236" text-anchor="middle" fill="#ED458E" font-size="13" font-weight="700">8. Confirmed</text>
  <text x="115" y="256" text-anchor="middle" fill="#909296" font-size="10">Block added to</text>
  <text x="115" y="272" text-anchor="middle" fill="#909296" font-size="10">the chain. Your tx</text>
  <text x="115" y="285" text-anchor="middle" fill="#909296" font-size="9">is on the blockchain!</text>

  <!-- Arrows row 2 (right to left) -->
  <line x1="608" y1="250" x2="572" y2="250" stroke="#E86040" stroke-width="2"/>
  <polygon points="574,246 568,250 574,254" fill="#E86040"/>
  <line x1="418" y1="250" x2="382" y2="250" stroke="#d94080" stroke-width="2"/>
  <polygon points="384,246 378,250 384,254" fill="#d94080"/>
  <line x1="228" y1="250" x2="192" y2="250" stroke="#ED458E" stroke-width="2"/>
  <polygon points="194,246 188,250 194,254" fill="#ED458E"/>

  <!-- Finality note -->
  <rect x="100" y="330" width="600" height="56" rx="10" fill="#25262b" stroke="#373a40" stroke-width="1"/>
  <text x="400" y="354" text-anchor="middle" fill="url(#tlGrad)" font-size="13" font-weight="700">Finality: ~20 minutes (k = 2160 blocks)</text>
  <text x="400" y="374" text-anchor="middle" fill="#909296" font-size="10">After enough blocks are added on top, your transaction becomes permanent and irreversible.</text>

  <!-- Timeline -->
  <text x="400" y="418" text-anchor="middle" fill="#909296" font-size="11" font-weight="600">Typical timing</text>
  <line x1="100" y1="435" x2="700" y2="435" stroke="#373a40" stroke-width="2"/>
  <circle cx="150" cy="435" r="5" fill="#ED458E"/>
  <text x="150" y="458" text-anchor="middle" fill="#909296" font-size="9">0s: Submit</text>
  <circle cx="300" cy="435" r="5" fill="#d94080"/>
  <text x="300" y="458" text-anchor="middle" fill="#909296" font-size="9">~1s: In mempool</text>
  <circle cx="450" cy="435" r="5" fill="#E86040"/>
  <text x="450" y="458" text-anchor="middle" fill="#909296" font-size="9">~20s: In a block</text>
  <circle cx="650" cy="435" r="5" fill="#F48020"/>
  <text x="650" y="458" text-anchor="middle" fill="#909296" font-size="9">~20min: Final</text>

  <rect y="496" width="800" height="4" fill="url(#tlGrad)" rx="2"/>
</svg>
