<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="mpGrad" gradientTransform="rotate(110)">
      <stop offset="0%" style="stop-color:#ED458E"/>
      <stop offset="100%" style="stop-color:#F48020"/>
    </linearGradient>
    <linearGradient id="mpN2N">
      <stop offset="0%" style="stop-color:#ED458E"/>
      <stop offset="100%" style="stop-color:#d03878"/>
    </linearGradient>
    <linearGradient id="mpN2C">
      <stop offset="0%" style="stop-color:#E86040"/>
      <stop offset="100%" style="stop-color:#F48020"/>
    </linearGradient>
    <filter id="mpShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="720" height="400" rx="16" fill="#1a1b1e"/>
  <rect width="720" height="4" fill="url(#mpGrad)"/>

  <text x="360" y="34" text-anchor="middle" fill="url(#mpGrad)" font-size="18" font-weight="800">Miniprotocols</text>
  <text x="360" y="52" text-anchor="middle" fill="#909296" font-size="10">The conversations nodes have with each other and with your wallet</text>

  <!-- N2N Section -->
  <text x="35" y="82" fill="#ED458E" font-size="13" font-weight="700">Node-to-Node</text>
  <text x="195" y="82" fill="#909296" font-size="10">Between peers on the network</text>

  <rect x="35" y="94" width="150" height="56" rx="8" fill="url(#mpN2N)" filter="url(#mpShadow)"/>
  <text x="110" y="116" text-anchor="middle" fill="white" font-size="12" font-weight="700">Chain-Sync</text>
  <text x="110" y="133" text-anchor="middle" fill="#ffcce0" font-size="9">Follow the chain tip</text>

  <rect x="200" y="94" width="150" height="56" rx="8" fill="url(#mpN2N)" filter="url(#mpShadow)"/>
  <text x="275" y="116" text-anchor="middle" fill="white" font-size="12" font-weight="700">Block-Fetch</text>
  <text x="275" y="133" text-anchor="middle" fill="#ffcce0" font-size="9">Download full blocks</text>

  <rect x="365" y="94" width="150" height="56" rx="8" fill="url(#mpN2N)" filter="url(#mpShadow)"/>
  <text x="440" y="116" text-anchor="middle" fill="white" font-size="12" font-weight="700">Tx-Submission</text>
  <text x="440" y="133" text-anchor="middle" fill="#ffcce0" font-size="9">Share transactions</text>

  <rect x="530" y="94" width="150" height="56" rx="8" fill="url(#mpN2N)" filter="url(#mpShadow)"/>
  <text x="605" y="116" text-anchor="middle" fill="white" font-size="12" font-weight="700">Keep-Alive</text>
  <text x="605" y="133" text-anchor="middle" fill="#ffcce0" font-size="9">Stay connected</text>

  <!-- Divider -->
  <line x1="35" y1="172" x2="685" y2="172" stroke="#373a40" stroke-width="1"/>

  <!-- N2C Section -->
  <text x="35" y="200" fill="#F48020" font-size="13" font-weight="700">Node-to-Client</text>
  <text x="195" y="200" fill="#909296" font-size="10">Between your node and wallets/apps</text>

  <rect x="35" y="212" width="155" height="56" rx="8" fill="url(#mpN2C)" filter="url(#mpShadow)"/>
  <text x="112" y="234" text-anchor="middle" fill="white" font-size="12" font-weight="700">Local Chain-Sync</text>
  <text x="112" y="251" text-anchor="middle" fill="#ffe0c0" font-size="9">Follow chain locally</text>

  <rect x="205" y="212" width="155" height="56" rx="8" fill="url(#mpN2C)" filter="url(#mpShadow)"/>
  <text x="282" y="234" text-anchor="middle" fill="white" font-size="12" font-weight="700">Local Tx-Submit</text>
  <text x="282" y="251" text-anchor="middle" fill="#ffe0c0" font-size="9">Submit transactions</text>

  <rect x="375" y="212" width="155" height="56" rx="8" fill="url(#mpN2C)" filter="url(#mpShadow)"/>
  <text x="452" y="234" text-anchor="middle" fill="white" font-size="12" font-weight="700">Local State-Query</text>
  <text x="452" y="251" text-anchor="middle" fill="#ffe0c0" font-size="9">Ask about chain state</text>

  <rect x="545" y="212" width="155" height="56" rx="8" fill="url(#mpN2C)" filter="url(#mpShadow)"/>
  <text x="622" y="234" text-anchor="middle" fill="white" font-size="12" font-weight="700">Local Tx-Monitor</text>
  <text x="622" y="251" text-anchor="middle" fill="#ffe0c0" font-size="9">Watch mempool</text>

  <!-- Turn-based explainer -->
  <rect x="100" y="300" width="520" height="68" rx="10" fill="#25262b" stroke="#373a40" stroke-width="1"/>
  <text x="360" y="324" text-anchor="middle" fill="url(#mpGrad)" font-size="13" font-weight="700">Turn-Based Conversations</text>
  <text x="360" y="344" text-anchor="middle" fill="#909296" font-size="10">Each miniprotocol is like a polite conversation: one side talks,</text>
  <text x="360" y="358" text-anchor="middle" fill="#909296" font-size="10">the other listens, then they swap. State machines keep everything orderly.</text>

  <rect y="396" width="720" height="4" fill="url(#mpGrad)" rx="2"/>
</svg>
