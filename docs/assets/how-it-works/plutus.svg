<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="plGrad" gradientTransform="rotate(110)">
      <stop offset="0%" style="stop-color:#ED458E"/>
      <stop offset="100%" style="stop-color:#F48020"/>
    </linearGradient>
    <linearGradient id="plScript">
      <stop offset="0%" style="stop-color:#d94080"/>
      <stop offset="100%" style="stop-color:#E86040"/>
    </linearGradient>
    <filter id="plShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="720" height="360" rx="16" fill="#1a1b1e"/>
  <rect width="720" height="4" fill="url(#plGrad)"/>

  <text x="360" y="34" text-anchor="middle" fill="url(#plGrad)" font-size="18" font-weight="800">Script Evaluation (Plutus)</text>
  <text x="360" y="52" text-anchor="middle" fill="#909296" font-size="10">Smart contracts that run on-chain to guard your funds</text>

  <!-- Three inputs to script -->
  <rect x="40" y="90" width="140" height="50" rx="8" fill="#25262b" stroke="#ED458E" stroke-width="1.5"/>
  <text x="110" y="112" text-anchor="middle" fill="#ED458E" font-size="12" font-weight="600">Datum</text>
  <text x="110" y="130" text-anchor="middle" fill="#909296" font-size="9">Data locked at the UTxO</text>

  <rect x="40" y="156" width="140" height="50" rx="8" fill="#25262b" stroke="#d94080" stroke-width="1.5"/>
  <text x="110" y="178" text-anchor="middle" fill="#d94080" font-size="12" font-weight="600">Redeemer</text>
  <text x="110" y="196" text-anchor="middle" fill="#909296" font-size="9">Proof from the spender</text>

  <rect x="40" y="222" width="140" height="50" rx="8" fill="#25262b" stroke="#F48020" stroke-width="1.5"/>
  <text x="110" y="244" text-anchor="middle" fill="#F48020" font-size="12" font-weight="600">Script Context</text>
  <text x="110" y="262" text-anchor="middle" fill="#909296" font-size="9">The whole transaction</text>

  <!-- Script execution box -->
  <rect x="260" y="120" width="200" height="130" rx="12" fill="url(#plScript)" filter="url(#plShadow)"/>
  <text x="360" y="158" text-anchor="middle" fill="white" font-size="16" font-weight="800">Plutus Script</text>
  <text x="360" y="180" text-anchor="middle" fill="#ffd0b0" font-size="10">Runs in a sandbox</text>
  <text x="360" y="196" text-anchor="middle" fill="#ffd0b0" font-size="10">with a cost budget</text>
  <text x="360" y="216" text-anchor="middle" fill="#ffe0c0" font-size="9">CPU steps + memory units</text>
  <text x="360" y="234" text-anchor="middle" fill="#ffe0c0" font-size="9">must stay within limits</text>

  <!-- Result -->
  <rect x="540" y="150" width="140" height="70" rx="10" fill="#25262b" stroke="#373a40" stroke-width="1.5"/>
  <text x="610" y="178" text-anchor="middle" fill="#4caf50" font-size="14" font-weight="700">Pass</text>
  <text x="610" y="198" text-anchor="middle" fill="#909296" font-size="10">or</text>
  <text x="610" y="212" text-anchor="middle" fill="#f44336" font-size="14" font-weight="700">Fail</text>

  <!-- Arrows -->
  <line x1="180" y1="115" x2="258" y2="155" stroke="#ED458E" stroke-width="2"/>
  <polygon points="256,151 264,155 256,159" fill="#ED458E"/>
  <line x1="180" y1="181" x2="258" y2="185" stroke="#d94080" stroke-width="2"/>
  <polygon points="256,181 264,185 256,189" fill="#d94080"/>
  <line x1="180" y1="247" x2="258" y2="215" stroke="#F48020" stroke-width="2"/>
  <polygon points="256,211 264,215 256,219" fill="#F48020"/>
  <line x1="460" y1="185" x2="538" y2="185" stroke="#E86040" stroke-width="2"/>
  <polygon points="536,181 544,185 536,189" fill="#E86040"/>

  <!-- Budget note -->
  <rect x="130" y="300" width="460" height="34" rx="8" fill="#25262b" stroke="#373a40" stroke-width="1"/>
  <text x="360" y="322" text-anchor="middle" fill="#909296" font-size="10">Scripts that exceed their budget fail, and the transaction that triggered them is rejected.</text>

  <rect y="356" width="720" height="4" fill="url(#plGrad)" rx="2"/>
</svg>
