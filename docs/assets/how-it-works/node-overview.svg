<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="ssGrad" gradientTransform="rotate(110)">
      <stop offset="0%" style="stop-color:#ED458E"/>
      <stop offset="100%" style="stop-color:#F48020"/>
    </linearGradient>
    <linearGradient id="netGrad">
      <stop offset="0%" style="stop-color:#ED458E"/>
      <stop offset="100%" style="stop-color:#d03878"/>
    </linearGradient>
    <linearGradient id="coreGrad">
      <stop offset="0%" style="stop-color:#d94080"/>
      <stop offset="100%" style="stop-color:#E86040"/>
    </linearGradient>
    <linearGradient id="storeGrad">
      <stop offset="0%" style="stop-color:#E86040"/>
      <stop offset="100%" style="stop-color:#F48020"/>
    </linearGradient>
    <linearGradient id="prodGrad">
      <stop offset="0%" style="stop-color:#F48020"/>
      <stop offset="100%" style="stop-color:#d06a18"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" rx="16" fill="#1a1b1e"/>
  <rect width="800" height="4" fill="url(#ssGrad)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="url(#ssGrad)" font-size="20" font-weight="800" letter-spacing="-0.02em">How a Cardano Node Works</text>
  <text x="400" y="56" text-anchor="middle" fill="#909296" font-size="11">Data flows from peers through validation to storage and block production</text>

  <!-- LAYER 1: External / Networking -->
  <text x="30" y="88" fill="#ED458E" font-size="12" font-weight="700" opacity="0.8">TALK TO PEERS</text>

  <!-- Peers -->
  <rect x="30" y="98" width="100" height="50" rx="8" fill="#25262b" stroke="#ED458E" stroke-width="1.5"/>
  <text x="80" y="120" text-anchor="middle" fill="#ED458E" font-size="11" font-weight="600">Peer Nodes</text>
  <text x="80" y="135" text-anchor="middle" fill="#909296" font-size="9">Other nodes on</text>
  <text x="80" y="145" text-anchor="middle" fill="#909296" font-size="9">the network</text>

  <!-- Networking -->
  <rect x="170" y="96" width="140" height="54" rx="10" fill="url(#netGrad)" filter="url(#shadow)"/>
  <text x="240" y="118" text-anchor="middle" fill="white" font-size="13" font-weight="700">Networking</text>
  <text x="240" y="134" text-anchor="middle" fill="#ffcce0" font-size="9">TCP connections &amp;</text>
  <text x="240" y="145" text-anchor="middle" fill="#ffcce0" font-size="9">multiplexing</text>

  <!-- Miniprotocols -->
  <rect x="350" y="96" width="140" height="54" rx="10" fill="url(#netGrad)" filter="url(#shadow)"/>
  <text x="420" y="118" text-anchor="middle" fill="white" font-size="13" font-weight="700">Miniprotocols</text>
  <text x="420" y="134" text-anchor="middle" fill="#ffcce0" font-size="9">Chain-sync, block-fetch</text>
  <text x="420" y="145" text-anchor="middle" fill="#ffcce0" font-size="9">tx-submit, state-query</text>

  <!-- Serialization (right side) -->
  <rect x="530" y="96" width="130" height="54" rx="10" fill="#25262b" stroke="#E86040" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="595" y="118" text-anchor="middle" fill="#E86040" font-size="13" font-weight="700">Serialization</text>
  <text x="595" y="134" text-anchor="middle" fill="#909296" font-size="9">CBOR encoding</text>
  <text x="595" y="145" text-anchor="middle" fill="#909296" font-size="9">&amp; decoding</text>

  <!-- Wallets / Apps -->
  <rect x="695" y="98" width="80" height="50" rx="8" fill="#25262b" stroke="#F48020" stroke-width="1.5"/>
  <text x="735" y="120" text-anchor="middle" fill="#F48020" font-size="11" font-weight="600">Wallets</text>
  <text x="735" y="135" text-anchor="middle" fill="#909296" font-size="9">&amp; Apps</text>

  <!-- Arrows: Peers -> Networking -> Miniprotocols -> Serialization -> Wallets -->
  <line x1="130" y1="123" x2="168" y2="123" stroke="#ED458E" stroke-width="2"/>
  <polygon points="166,119 174,123 166,127" fill="#ED458E"/>
  <line x1="310" y1="123" x2="348" y2="123" stroke="#ED458E" stroke-width="2"/>
  <polygon points="346,119 354,123 346,127" fill="#ED458E"/>
  <line x1="490" y1="123" x2="528" y2="123" stroke="#E86040" stroke-width="2"/>
  <polygon points="526,119 534,123 526,127" fill="#E86040"/>
  <line x1="660" y1="123" x2="693" y2="123" stroke="#F48020" stroke-width="2"/>
  <polygon points="691,119 697,123 691,127" fill="#F48020"/>

  <!-- LAYER 2: Core Processing -->
  <text x="30" y="190" fill="#d94080" font-size="12" font-weight="700" opacity="0.8">VALIDATE</text>

  <!-- Mempool -->
  <rect x="60" y="200" width="160" height="80" rx="10" fill="url(#coreGrad)" filter="url(#shadow)"/>
  <text x="140" y="228" text-anchor="middle" fill="white" font-size="14" font-weight="700">Mempool</text>
  <text x="140" y="246" text-anchor="middle" fill="#ffd0b0" font-size="10">Waiting room for</text>
  <text x="140" y="260" text-anchor="middle" fill="#ffd0b0" font-size="10">unconfirmed transactions</text>

  <!-- Consensus -->
  <rect x="260" y="200" width="160" height="80" rx="10" fill="url(#coreGrad)" filter="url(#shadow)"/>
  <text x="340" y="228" text-anchor="middle" fill="white" font-size="14" font-weight="700">Consensus</text>
  <text x="340" y="246" text-anchor="middle" fill="#ffd0b0" font-size="10">Ouroboros Praos</text>
  <text x="340" y="260" text-anchor="middle" fill="#ffd0b0" font-size="10">leader election &amp; forks</text>

  <!-- Ledger -->
  <rect x="460" y="200" width="160" height="80" rx="10" fill="url(#coreGrad)" filter="url(#shadow)"/>
  <text x="540" y="228" text-anchor="middle" fill="white" font-size="14" font-weight="700">Ledger Rules</text>
  <text x="540" y="246" text-anchor="middle" fill="#ffd0b0" font-size="10">UTxO validation</text>
  <text x="540" y="260" text-anchor="middle" fill="#ffd0b0" font-size="10">&amp; state transitions</text>

  <!-- Plutus -->
  <rect x="640" y="210" width="130" height="60" rx="10" fill="#25262b" stroke="#d94080" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="705" y="236" text-anchor="middle" fill="#d94080" font-size="12" font-weight="700">Plutus Scripts</text>
  <text x="705" y="252" text-anchor="middle" fill="#909296" font-size="9">Smart contract</text>
  <text x="705" y="264" text-anchor="middle" fill="#909296" font-size="9">evaluation</text>

  <!-- Arrows down from Layer 1 to Layer 2 -->
  <line x1="420" y1="152" x2="340" y2="198" stroke="#d94080" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="336,195 344,201 339,193" fill="#d94080"/>
  <line x1="420" y1="152" x2="140" y2="198" stroke="#d94080" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="136,195 144,201 139,193" fill="#d94080"/>
  <line x1="420" y1="152" x2="540" y2="198" stroke="#d94080" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="536,195 544,201 539,193" fill="#d94080"/>

  <!-- Arrow Ledger -> Plutus -->
  <line x1="620" y1="240" x2="638" y2="240" stroke="#d94080" stroke-width="1.5"/>
  <polygon points="636,236 644,240 636,244" fill="#d94080"/>

  <!-- LAYER 3: Storage -->
  <text x="30" y="320" fill="#E86040" font-size="12" font-weight="700" opacity="0.8">REMEMBER</text>

  <rect x="200" y="330" width="400" height="70" rx="12" fill="url(#storeGrad)" filter="url(#shadow)"/>
  <text x="400" y="358" text-anchor="middle" fill="white" font-size="16" font-weight="700">Storage</text>
  <text x="400" y="378" text-anchor="middle" fill="#ffe0c0" font-size="11">Blockchain database — immutable chain + volatile tip + ledger snapshots</text>

  <!-- Arrows down from Layer 2 to Layer 3 -->
  <line x1="340" y1="282" x2="350" y2="328" stroke="#E86040" stroke-width="2"/>
  <polygon points="346,326 354,332 349,324" fill="#E86040"/>
  <line x1="540" y1="282" x2="450" y2="328" stroke="#E86040" stroke-width="2"/>
  <polygon points="446,326 454,332 449,324" fill="#E86040"/>

  <!-- LAYER 4: Block Production -->
  <text x="30" y="440" fill="#F48020" font-size="12" font-weight="700" opacity="0.8">PRODUCE BLOCKS</text>

  <rect x="230" y="450" width="340" height="70" rx="12" fill="url(#prodGrad)" filter="url(#shadow)"/>
  <text x="400" y="478" text-anchor="middle" fill="white" font-size="16" font-weight="700">Block Production</text>
  <text x="400" y="498" text-anchor="middle" fill="#ffe0c0" font-size="11">When elected leader: forge a new block from mempool transactions</text>

  <!-- Arrows from Storage and Mempool to Block Production -->
  <line x1="400" y1="402" x2="400" y2="448" stroke="#F48020" stroke-width="2"/>
  <polygon points="396,446 404,452 399,444" fill="#F48020"/>
  <line x1="140" y1="282" x2="270" y2="448" stroke="#F48020" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="266,445 274,451 269,443" fill="#F48020"/>

  <!-- Legend bar -->
  <rect x="30" y="546" width="740" height="36" rx="8" fill="#25262b" stroke="#373a40" stroke-width="1"/>
  <circle cx="60" cy="564" r="6" fill="url(#netGrad)"/>
  <text x="72" y="568" fill="#909296" font-size="10">Network layer</text>
  <circle cx="175" cy="564" r="6" fill="url(#coreGrad)"/>
  <text x="187" y="568" fill="#909296" font-size="10">Core processing</text>
  <circle cx="305" cy="564" r="6" fill="url(#storeGrad)"/>
  <text x="317" y="568" fill="#909296" font-size="10">Persistence</text>
  <circle cx="415" cy="564" r="6" fill="url(#prodGrad)"/>
  <text x="427" y="568" fill="#909296" font-size="10">Block forging</text>
  <text x="580" y="568" fill="#909296" font-size="10" font-style="italic">Dashed lines = async data flow</text>

  <rect y="596" width="800" height="4" fill="url(#ssGrad)" rx="2"/>
</svg>
