<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="srGrad" gradientTransform="rotate(110)">
      <stop offset="0%" style="stop-color:#ED458E"/>
      <stop offset="100%" style="stop-color:#F48020"/>
    </linearGradient>
    <linearGradient id="srEnc">
      <stop offset="0%" style="stop-color:#E86040"/>
      <stop offset="100%" style="stop-color:#F48020"/>
    </linearGradient>
    <filter id="srShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="720" height="320" rx="16" fill="#1a1b1e"/>
  <rect width="720" height="4" fill="url(#srGrad)"/>

  <text x="360" y="34" text-anchor="middle" fill="url(#srGrad)" font-size="18" font-weight="800">Serialization (CBOR)</text>
  <text x="360" y="52" text-anchor="middle" fill="#909296" font-size="10">The universal language nodes use to pack and unpack data</text>

  <!-- Human-readable side -->
  <rect x="40" y="80" width="200" height="120" rx="10" fill="#25262b" stroke="#ED458E" stroke-width="1.5" filter="url(#srShadow)"/>
  <text x="140" y="106" text-anchor="middle" fill="#ED458E" font-size="13" font-weight="700">Structured Data</text>
  <text x="140" y="128" text-anchor="middle" fill="#909296" font-size="10">Transaction</text>
  <text x="140" y="145" text-anchor="middle" fill="#909296" font-size="10">inputs, outputs, fee</text>
  <text x="140" y="162" text-anchor="middle" fill="#909296" font-size="10">signatures, metadata</text>
  <text x="140" y="185" text-anchor="middle" fill="#ffcce0" font-size="9">Readable by your node</text>

  <!-- CBOR encoding box -->
  <rect x="290" y="100" width="140" height="80" rx="10" fill="url(#srEnc)" filter="url(#srShadow)"/>
  <text x="360" y="130" text-anchor="middle" fill="white" font-size="15" font-weight="800">CBOR</text>
  <text x="360" y="150" text-anchor="middle" fill="#ffe0c0" font-size="10">Encode / Decode</text>
  <text x="360" y="168" text-anchor="middle" fill="#ffe0c0" font-size="9">Compact binary format</text>

  <!-- Wire format side -->
  <rect x="480" y="80" width="200" height="120" rx="10" fill="#25262b" stroke="#F48020" stroke-width="1.5" filter="url(#srShadow)"/>
  <text x="580" y="106" text-anchor="middle" fill="#F48020" font-size="13" font-weight="700">Bytes on the Wire</text>
  <text x="580" y="128" text-anchor="middle" fill="#909296" font-size="10">82 a7 00 81 82 58 20</text>
  <text x="580" y="145" text-anchor="middle" fill="#909296" font-size="10">b3 f2 1a 6e 4d c8 ...</text>
  <text x="580" y="168" text-anchor="middle" fill="#ffd0b0" font-size="9">Compact for the network</text>

  <!-- Arrows -->
  <line x1="240" y1="130" x2="288" y2="130" stroke="#ED458E" stroke-width="2"/>
  <polygon points="286,126 294,130 286,134" fill="#ED458E"/>
  <line x1="430" y1="130" x2="478" y2="130" stroke="#F48020" stroke-width="2"/>
  <polygon points="476,126 484,130 476,134" fill="#F48020"/>
  <line x1="478" y1="150" x2="432" y2="150" stroke="#F48020" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="434,146 428,150 434,154" fill="#F48020"/>
  <line x1="288" y1="150" x2="242" y2="150" stroke="#ED458E" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="244,146 238,150 244,154" fill="#ED458E"/>

  <!-- Bottom explanation -->
  <rect x="80" y="230" width="560" height="56" rx="10" fill="#25262b" stroke="#373a40" stroke-width="1"/>
  <text x="360" y="254" text-anchor="middle" fill="url(#srGrad)" font-size="12" font-weight="700">Every block, transaction, and protocol message uses CBOR</text>
  <text x="360" y="274" text-anchor="middle" fill="#909296" font-size="10">Bit-perfect encoding matters: even one byte wrong means a different block hash.</text>

  <rect y="316" width="720" height="4" fill="url(#srGrad)" rx="2"/>
</svg>
