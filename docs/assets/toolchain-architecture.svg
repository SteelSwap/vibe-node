<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 540" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="tcSSGrad" gradientTransform="rotate(110)">
      <stop offset="0%" style="stop-color:#ED458E"/>
      <stop offset="100%" style="stop-color:#F48020"/>
    </linearGradient>
    <linearGradient id="tcCardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25262b"/>
      <stop offset="100%" style="stop-color:#1a1b1e"/>
    </linearGradient>
    <linearGradient id="tcPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ED458E"/>
      <stop offset="100%" style="stop-color:#d03878"/>
    </linearGradient>
    <linearGradient id="tcOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F48020"/>
      <stop offset="100%" style="stop-color:#d06a18"/>
    </linearGradient>
    <linearGradient id="tcGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#40c057"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
    <linearGradient id="tcBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#228be6"/>
      <stop offset="100%" style="stop-color:#1c6fb8"/>
    </linearGradient>
    <filter id="tcShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="740" height="540" rx="16" fill="#1a1b1e"/>
  <rect width="740" height="4" fill="url(#tcSSGrad)"/>

  <!-- Title -->
  <text x="370" y="34" text-anchor="middle" fill="url(#tcSSGrad)" font-size="19" font-weight="800" letter-spacing="-0.02em">Toolchain Architecture</text>

  <!-- ─── Development Environment ─── -->
  <rect x="20" y="52" width="350" height="210" rx="12" fill="url(#tcCardBg)" stroke="#373a40" stroke-width="1" filter="url(#tcShadow)"/>
  <text x="195" y="74" text-anchor="middle" fill="#909296" font-size="11" font-weight="600" letter-spacing="1">DEVELOPMENT ENVIRONMENT</text>

  <rect x="40" y="88" width="145" height="52" rx="8" fill="url(#tcPink)"/>
  <text x="112" y="111" text-anchor="middle" fill="white" font-size="11" font-weight="700">Claude Code</text>
  <text x="112" y="127" text-anchor="middle" fill="#ffcce0" font-size="9">Opus 4.6 · 1M ctx</text>

  <rect x="205" y="88" width="145" height="52" rx="8" fill="url(#tcOrange)"/>
  <text x="277" y="111" text-anchor="middle" fill="white" font-size="11" font-weight="700">Search MCP</text>
  <text x="277" y="127" text-anchor="middle" fill="#ffe0c0" font-size="9">Embed + RRF fusion</text>

  <line x1="188" y1="114" x2="202" y2="114" stroke="#909296" stroke-width="1.5"/>

  <rect x="40" y="155" width="145" height="42" rx="8" fill="#2c2e33"/>
  <text x="112" y="181" text-anchor="middle" fill="#c1c2c5" font-size="10" font-weight="500">Plane MCP</text>

  <rect x="205" y="155" width="145" height="42" rx="8" fill="#2c2e33"/>
  <text x="277" y="181" text-anchor="middle" fill="#c1c2c5" font-size="10" font-weight="500">CrystalDB MCP</text>

  <!-- ─── Knowledge Base ─── -->
  <rect x="390" y="52" width="330" height="210" rx="12" fill="url(#tcCardBg)" stroke="#373a40" stroke-width="1" filter="url(#tcShadow)"/>
  <text x="555" y="74" text-anchor="middle" fill="#909296" font-size="11" font-weight="600" letter-spacing="1">KNOWLEDGE BASE</text>

  <rect x="410" y="88" width="140" height="52" rx="8" fill="url(#tcBlue)"/>
  <text x="480" y="111" text-anchor="middle" fill="white" font-size="11" font-weight="700">ParadeDB</text>
  <text x="480" y="127" text-anchor="middle" fill="#b0d8ff" font-size="9">pg17 · BM25 · pgvector</text>

  <rect x="565" y="88" width="135" height="52" rx="8" fill="url(#tcGreen)"/>
  <text x="632" y="111" text-anchor="middle" fill="white" font-size="11" font-weight="700">Ollama</text>
  <text x="632" y="127" text-anchor="middle" fill="#b0f0c0" font-size="9">Jina Code 1.5B</text>

  <line x1="353" y1="114" x2="407" y2="114" stroke="#909296" stroke-width="1.5"/>

  <rect x="410" y="155" width="88" height="42" rx="8" fill="#2c2e33"/>
  <text x="454" y="181" text-anchor="middle" fill="#c1c2c5" font-size="9" font-weight="500">PaddleOCR</text>

  <rect x="508" y="155" width="88" height="42" rx="8" fill="#2c2e33"/>
  <text x="552" y="181" text-anchor="middle" fill="#c1c2c5" font-size="9" font-weight="500">tree-sitter</text>

  <rect x="606" y="155" width="94" height="42" rx="8" fill="#2c2e33"/>
  <text x="653" y="181" text-anchor="middle" fill="#c1c2c5" font-size="9" font-weight="500">GitHub API</text>

  <!-- ─── Cardano Infrastructure ─── -->
  <rect x="20" y="280" width="350" height="125" rx="12" fill="url(#tcCardBg)" stroke="#373a40" stroke-width="1" filter="url(#tcShadow)"/>
  <text x="195" y="302" text-anchor="middle" fill="#909296" font-size="11" font-weight="600" letter-spacing="1">CARDANO INFRASTRUCTURE</text>

  <rect x="40" y="315" width="95" height="68" rx="8" fill="url(#tcOrange)"/>
  <text x="87" y="347" text-anchor="middle" fill="white" font-size="10" font-weight="700">Mithril</text>
  <text x="87" y="363" text-anchor="middle" fill="#ffe0c0" font-size="8">Snapshots</text>

  <rect x="152" y="315" width="105" height="68" rx="8" fill="url(#tcPink)"/>
  <text x="204" y="342" text-anchor="middle" fill="white" font-size="10" font-weight="700">cardano-</text>
  <text x="204" y="357" text-anchor="middle" fill="white" font-size="10" font-weight="700">node</text>
  <text x="204" y="373" text-anchor="middle" fill="#ffcce0" font-size="8">Haskell ref</text>

  <rect x="274" y="315" width="80" height="68" rx="8" fill="url(#tcOrange)"/>
  <text x="314" y="347" text-anchor="middle" fill="white" font-size="10" font-weight="700">Ogmios</text>
  <text x="314" y="363" text-anchor="middle" fill="#ffe0c0" font-size="8">JSON/WS</text>

  <line x1="138" y1="349" x2="149" y2="349" stroke="#c1c2c5" stroke-width="1.5"/>
  <line x1="260" y1="349" x2="271" y2="349" stroke="#c1c2c5" stroke-width="1.5"/>

  <!-- ─── Project Tooling ─── -->
  <rect x="390" y="280" width="330" height="125" rx="12" fill="url(#tcCardBg)" stroke="#373a40" stroke-width="1" filter="url(#tcShadow)"/>
  <text x="555" y="302" text-anchor="middle" fill="#909296" font-size="11" font-weight="600" letter-spacing="1">PROJECT TOOLING</text>

  <rect x="410" y="315" width="88" height="42" rx="8" fill="#2c2e33"/>
  <text x="454" y="333" text-anchor="middle" fill="#c1c2c5" font-size="9" font-weight="600">Python 3.14</text>
  <text x="454" y="347" text-anchor="middle" fill="#909296" font-size="8">uv · typer</text>

  <rect x="508" y="315" width="88" height="42" rx="8" fill="#2c2e33"/>
  <text x="552" y="333" text-anchor="middle" fill="#c1c2c5" font-size="9" font-weight="600">SQLModel</text>
  <text x="552" y="347" text-anchor="middle" fill="#909296" font-size="8">asyncpg</text>

  <rect x="606" y="315" width="94" height="42" rx="8" fill="#2c2e33"/>
  <text x="653" y="333" text-anchor="middle" fill="#c1c2c5" font-size="9" font-weight="600">MkDocs</text>
  <text x="653" y="347" text-anchor="middle" fill="#909296" font-size="8">Material</text>

  <rect x="410" y="362" width="88" height="30" rx="6" fill="#1a1b1e" stroke="#373a40" stroke-width="1"/>
  <text x="454" y="382" text-anchor="middle" fill="#909296" font-size="8">bump-my-version</text>

  <rect x="508" y="362" width="88" height="30" rx="6" fill="#1a1b1e" stroke="#373a40" stroke-width="1"/>
  <text x="552" y="382" text-anchor="middle" fill="#909296" font-size="8">Docker Compose</text>

  <rect x="606" y="362" width="94" height="30" rx="6" fill="#1a1b1e" stroke="#373a40" stroke-width="1"/>
  <text x="653" y="382" text-anchor="middle" fill="#909296" font-size="8">Plane</text>

  <!-- Legend -->
  <rect x="100" y="430" width="180" height="60" rx="8" fill="#25262b" stroke="#373a40" stroke-width="1"/>
  <text x="190" y="451" text-anchor="middle" fill="url(#tcSSGrad)" font-size="10" font-weight="700">Specs + Code + Issues</text>
  <text x="190" y="466" text-anchor="middle" fill="#909296" font-size="9">Ingested → ParadeDB</text>
  <text x="190" y="479" text-anchor="middle" fill="#909296" font-size="9">Embedded via Ollama</text>

  <rect x="300" y="430" width="170" height="60" rx="8" fill="#25262b" stroke="#373a40" stroke-width="1"/>
  <text x="385" y="451" text-anchor="middle" fill="url(#tcSSGrad)" font-size="10" font-weight="700">Agent Queries</text>
  <text x="385" y="466" text-anchor="middle" fill="#909296" font-size="9">Search MCP → embed</text>
  <text x="385" y="479" text-anchor="middle" fill="#909296" font-size="9">→ BM25+vector RRF</text>

  <rect x="490" y="430" width="160" height="60" rx="8" fill="#25262b" stroke="#373a40" stroke-width="1"/>
  <text x="570" y="451" text-anchor="middle" fill="url(#tcSSGrad)" font-size="10" font-weight="700">Conformance</text>
  <text x="570" y="466" text-anchor="middle" fill="#909296" font-size="9">Our node vs Haskell</text>
  <text x="570" y="479" text-anchor="middle" fill="#909296" font-size="9">via Ogmios/socket</text>

  <!-- Bottom gradient bar -->
  <rect y="536" width="740" height="4" fill="url(#tcSSGrad)" rx="2"/>
</svg>
