site_name: vibe-node
site_description: A vibe-coded Cardano node — built in public, tested against the Haskell node
site_author: Elder Millenial
copyright: "&copy; 2026 SteelSwap — Licensed under AGPL-3.0"

theme:
  name: material
  logo: assets/steelswap-logo.png
  favicon: assets/steelswap-logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: pink
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: pink
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - About:
    - Overview: about/index.md
    - The Challenge: about/challenge.md
    - How We Build: about/methodology.md
    - Toolchain: about/toolchain.md
    - Agent Architecture: about/agents.md
    - Coordination: about/coordination.md
  - Specifications:
    - Overview: specs/index.md
    - Gap Analysis: specs/gap-analysis.md
    - Byron: specs/byron/index.md
    - Shelley: specs/shelley/index.md
    - Mary/Allegra: specs/shelley-ma/index.md
    - Alonzo: specs/alonzo/index.md
    - Conway: specs/conway/index.md
    - Plutus: specs/plutus/index.md
    - Consensus: specs/consensus/index.md
    - Networking: specs/networking/index.md
    - Papers: specs/papers/index.md
  - Development:
    - Overview: development/index.md
    - Milestones: development/milestones.md
    - Phase 0 Tasks: development/tasks.md
    - Development Log:
      - Journal: development/devlog/index.md
      - "Phase 0, Wave 1 — Foundation": development/devlog/phase0-wave1.md
      - "Phase 0, Wave 2 — Ingestion & CLI": development/devlog/phase0-wave2.md
  - Reference:
    - Overview: reference/index.md
    - CLI Reference: reference/cli-reference.md
    - Database Schema: reference/schema.md
    - Architecture: reference/architecture.md
    - Development Workflow: reference/workflow.md
    - Pipelines:
      - Spec Ingestion: reference/pipelines/spec-ingestion.md
      - Code Indexing: reference/pipelines/code-indexing.md
      - GitHub Ingestion: reference/pipelines/github-ingestion.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SteelSwap/vibe-node
