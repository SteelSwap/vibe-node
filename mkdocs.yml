site_name: vibe-node
site_description: A vibe-coded Cardano node — built in public, tested against the Haskell node
site_author: Elder Millenial
copyright: "&copy; 2026 SteelSwap — Licensed under AGPL-3.0"

theme:
  name: material
  logo: assets/steelswap-logo.png
  favicon: assets/steelswap-logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: pink
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: pink
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

not_in_nav: |
  /specs/foundations/*.md
  /specs/serialization/*.md
  /specs/transactions/*.md
  /specs/ledger/*.md
  /specs/consensus/*.md
  /specs/storage/*.md
  /specs/networking/*.md
  /specs/plutus/*.md
  /specs/governance/*.md
  /specs/papers/*.md
  /superpowers/**
  /development/devlog/phase0-wave1.md
  /development/devlog/phase0-wave2.md
  /development/devlog/phase0-wave3.md
  /development/tasks.md
  /reference/architecture.md

nav:
  - Home: index.md
  - How It Works:
    - Overview: how-it-works/index.md
    - Networking: how-it-works/networking.md
    - Miniprotocols: how-it-works/miniprotocols.md
    - Consensus: how-it-works/consensus.md
    - Ledger Rules: how-it-works/ledger.md
    - Script Evaluation: how-it-works/plutus.md
    - Serialization: how-it-works/serialization.md
    - Mempool: how-it-works/mempool.md
    - Storage: how-it-works/storage.md
    - Block Production: how-it-works/block-production.md
    - Transaction Lifecycle: how-it-works/transaction-lifecycle.md
  - About:
    - Overview: about/index.md
    - The Challenge: about/challenge.md
    - How We Build: about/methodology.md
    - Toolchain: about/toolchain.md
    - Agent Architecture: about/agents.md
    - Coordination: about/coordination.md
  - Specifications:
    - Overview: specs/index.md
    - Gap Analysis: specs/gap-analysis.md
    - Foundations: specs/foundations/index.md
    - Serialization: specs/serialization/index.md
    - Transactions: specs/transactions/index.md
    - Ledger: specs/ledger/index.md
    - Consensus: specs/consensus/index.md
    - Storage: specs/storage/index.md
    - Networking: specs/networking/index.md
    - Plutus: specs/plutus/index.md
    - Governance: specs/governance/index.md
    - Papers: specs/papers/index.md
  - Development:
    - Overview: development/index.md
    - Milestones: development/milestones.md
    - Architecture Blueprint: development/architecture-blueprint.md
    - Data Architecture: development/data-architecture.md
    - Library Audit: development/library-audit.md
    - Package Structure: development/package-structure.md
    - Test Strategy: development/test-strategy.md
    - Test Matrix: development/test-matrix.md
    - Node Subsystems:
      - Overview: development/subsystems/index.md
      - Networking: development/subsystems/networking.md
      - "Miniprotocols (N2N)": development/subsystems/miniprotocols-n2n.md
      - "Miniprotocols (N2C)": development/subsystems/miniprotocols-n2c.md
      - Consensus: development/subsystems/consensus.md
      - Ledger Rules: development/subsystems/ledger.md
      - Plutus: development/subsystems/plutus.md
      - Serialization: development/subsystems/serialization.md
      - Mempool: development/subsystems/mempool.md
      - Storage: development/subsystems/storage.md
      - Block Production: development/subsystems/block-production.md
    - Development Log:
      - Journal: development/devlog/index.md
      - "Phase 3 — Chain Sync & Storage": development/devlog/phase3.md
      - "Phase 2 — Serialization & Networking": development/devlog/phase2.md
      - "Phase 1 — Research & Analysis": development/devlog/phase1.md
      - "Phase 0 — Development Architecture": development/devlog/phase0.md
  - Reference:
    - Overview: reference/index.md
    - CLI Reference: reference/cli-reference.md
    - Database Schema: reference/schema.md
    - Development Workflow: reference/workflow.md
    - Pipelines:
      - Spec Ingestion: reference/pipelines/spec-ingestion.md
      - Code Indexing: reference/pipelines/code-indexing.md
      - GitHub Ingestion: reference/pipelines/github-ingestion.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SteelSwap/vibe-node
