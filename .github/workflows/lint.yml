name: Lint & Format

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Pin Python 3.14
        run: uv python pin 3.14

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check src/ packages/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ packages/ tests/

      - name: Black check
        run: uv run black --check src/ packages/ tests/
