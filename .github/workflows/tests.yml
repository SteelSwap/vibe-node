name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install system dependencies (libsodium build)
        run: sudo apt-get update && sudo apt-get install -y build-essential autoconf automake libtool cmake

      - name: Install dependencies + build VRF native extension
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -n auto -v --tb=short -p no:sugar -p no:benchmark --timeout=60
