[project]
name = "vibe-tools"
version = "0.1.0"
description = "Development infrastructure — ingestion, MCP, research pipelines"
requires-python = ">=3.14"
dependencies = [
    "anthropic>=0.85.0",
    "asyncpg>=0.31.0",
    "greenlet>=3.3.2",
    "httpx>=0.28.1",
    "mcp>=1.26.0",
    "pydantic-ai>=1.69.0",
    "rich>=14.3.3",
    "sqlmodel>=0.0.37",
    "tree-sitter>=0.25.2",
    "tree-sitter-haskell>=0.23.1",
]

[build-system]
requires = ["uv_build>=0.8.4,<0.9.0"]
build-backend = "uv_build"
