[project]
name = "vibe-cardano"
version = "0.1.0"
description = "Cardano-specific node implementation"
requires-python = ">=3.14"
dependencies = [
    "cbor2pure>=5.8.0",
    "cryptography>=44.0.0",
    "httpx>=0.28.1",
    "pyarrow>=19.0.0",
    "pycardano>=0.19.2",
    "rich>=14.3.3",
    "uplc>=1.3.2",
    "vibe-core",
    "websockets>=16.0",
]

[build-system]
requires = [
    "scikit-build-core>=0.10",
    "pybind11>=2.13",
]
build-backend = "scikit_build_core.build"

[tool.scikit-build]
# Minimum CMake version
cmake.version = ">=3.18"

# Build directory (keeps it clean)
build-dir = "build/{wheel_tag}"

# Install the extension into the correct package path
wheel.install-dir = "vibe/cardano/crypto"

# The wheel still includes our pure Python source
wheel.packages = ["src/vibe"]

# If libsodium submodule isn't initialized or autotools missing, fall back
# to a pure Python wheel (VRF ops raise NotImplementedError)
cmake.build-type = "Release"
minimum-version = "build-system.requires"

# Allow building without the native extension (graceful fallback)
[tool.scikit-build.cmake.define]
CMAKE_BUILD_TYPE = "Release"
