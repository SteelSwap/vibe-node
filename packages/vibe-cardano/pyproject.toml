[project]
name = "vibe-cardano"
version = "0.1.0"
description = "Cardano-specific node implementation"
requires-python = ">=3.14"
dependencies = [
    "cbor2pure>=5.8.0",
    "cryptography>=44.0.0",
    "httpx>=0.28.1",
    "pyarrow>=19.0.0",
    "pycardano>=0.19.2",
    "rich>=14.3.3",
    "uplc>=1.3.2",
    "vibe-core",
    "websockets>=16.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vibe"]

[dependency-groups]
dev = [
    "pytest-benchmark>=5.2.3",
]

# ---------------------------------------------------------------------------
# Native VRF extension (built separately via scripts/build-vrf.sh or CI)
# ---------------------------------------------------------------------------
# The _vrf_native pybind11 extension wraps the IOG libsodium fork for
# ECVRF-ED25519-SHA512-Elligator2. Built via CMake in CI (see tests.yml)
# or locally via ./scripts/build-vrf.sh. Not part of the wheel build.
