[project]
name = "vibe-cardano"
version = "0.1.0"
description = "Cardano-specific node implementation"
requires-python = ">=3.14"
dependencies = [
    "cbor2pure>=5.8.0",
    "httpx>=0.28.1",
    "pyarrow>=19.0.0",
    "pycardano>=0.19.2",
    "rich>=14.3.3",
    "uplc>=1.3.2",
    "vibe-core",
    "websockets>=16.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vibe"]
