[project]
name = "vibe-cardano"
version = "0.1.0"
description = "Cardano-specific node implementation"
requires-python = ">=3.14"
dependencies = [
    "cbor2pure>=5.8.0",
    "cryptography>=44.0.0",
    "httpx>=0.28.1",
    "pyarrow>=19.0.0",
    "pycardano>=0.19.2",
    "rich>=14.3.3",
    "uplc>=1.3.2",
    "vibe-core",
    "websockets>=16.0",
]

[build-system]
requires = [
    "scikit-build-core>=0.10",
    "pybind11>=2.13",
]
build-backend = "scikit_build_core.build"

[tool.scikit-build]
cmake.version = ">=3.18"
build-dir = "build/{wheel_tag}"
wheel.install-dir = "vibe/cardano/crypto"
wheel.packages = ["src/vibe"]
cmake.build-type = "Release"
minimum-version = "build-system.requires"

[tool.scikit-build.cmake.define]
CMAKE_BUILD_TYPE = "Release"
