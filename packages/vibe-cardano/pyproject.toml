[project]
name = "vibe-cardano"
version = "0.1.0"
description = "Cardano-specific node implementation"
requires-python = ">=3.14"
dependencies = [
    "vibe-core",
    "cbor2>=5.6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vibe"]
